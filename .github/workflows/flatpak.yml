name: Flatpak

# Builds a Linux Flatpak bundle of Tari Universe and (on release) attaches it as
# a release asset. Designed to need zero per-release maintenance:
#   * the manifest builds the checked-out tree (no pinned commit/version), and
#   * the offline cargo/npm sources are regenerated here from this commit's
#     lockfiles, so they can never drift out of sync with a release.
#
# Standalone — does not touch the existing release pipeline. It produces a
# sideload bundle (`flatpak install <file>.flatpak`); it does not auto-update.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: current branch)"
        required: false
        default: ""

permissions:
  contents: write # upload the bundle to the triggering release

concurrency:
  group: flatpak-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  flatpak:
    name: Flatpak (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3-venv python3-pip jq
          flatpak remote-add --if-not-exists --user flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      # Caches downloaded git/crate/npm sources + the build tree across runs.
      # Keyed on the lockfiles so it busts exactly when dependencies change.
      - name: Cache flatpak-builder state
        uses: actions/cache@v4
        with:
          path: flatpak/.flatpak-builder
          key: flatpak-builder-${{ hashFiles('Cargo.lock', 'package-lock.json') }}
          restore-keys: |
            flatpak-builder-

      # Regenerate the vendored offline sources from THIS commit's lockfiles.
      # This is what keeps the build correct for every future release without
      # anyone having to hand-update the committed *-sources.json files.
      - name: Regenerate offline dependency sources
        run: ./flatpak/generate-sources.sh

      - name: Build Flatpak
        working-directory: flatpak
        run: |
          flatpak-builder --user --install-deps-from=flathub --force-clean \
            --state-dir=.flatpak-builder --repo=repo \
            build-dir com.tari.universe.yml

      - name: Bundle .flatpak
        working-directory: flatpak
        run: |
          VERSION="$(jq -r .version ../src-tauri/tauri.conf.json)"
          OUT="tari-universe-${VERSION}-x86_64.flatpak"
          flatpak build-bundle repo "${OUT}" com.tari.universe
          echo "OUT=${OUT}" >> "$GITHUB_ENV"
          echo "BUNDLE=flatpak/${OUT}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.OUT }}
          path: ${{ env.BUNDLE }}
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.BUNDLE }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
